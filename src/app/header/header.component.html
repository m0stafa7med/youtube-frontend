<mat-toolbar class="youtube-header">
    <mat-toolbar-row>
        <!-- LOGO -->
        <span class="youtube-logo" routerLink="/" title="Home">
      Mostafa
    </span>

        <!-- SEARCH BAR -->
        <div class="search-container">
            <input type="text"
                   [(ngModel)]="searchQuery"
                   placeholder="Search"
                   (keyup.enter)="onSearch()">
            <button mat-icon-button (click)="onSearch()" aria-label="Search">
                <mat-icon>search</mat-icon>
            </button>
        </div>

        <span class="example-spacer"></span>

        <!-- THEME TOGGLE -->
        <button mat-icon-button (click)="toggleTheme()" aria-label="Toggle theme">
            <mat-icon>{{ isDarkMode ? 'light_mode' : 'dark_mode' }}</mat-icon>
        </button>

        <!-- NOTIFICATION BELL -->
        <div class="notification-wrapper" *ngIf="isAuthenticated">
            <button mat-icon-button (click)="toggleNotifications()" aria-label="Notifications">
                <mat-icon [matBadge]="unreadCount"
                          [matBadgeHidden]="unreadCount === 0"
                          matBadgeColor="warn"
                          matBadgeSize="small">notifications</mat-icon>
            </button>

            <!-- Notification Dropdown -->
            <div class="notification-dropdown" *ngIf="showNotifications">
                <div class="notification-header">
                    <span>Notifications</span>
                    <button mat-button (click)="markAllRead()" *ngIf="unreadCount > 0">
                        Mark all as read
                    </button>
                </div>
                <div class="notification-list">
                    <div class="notification-item"
                         *ngFor="let notification of notifications"
                         [class.unread]="!notification.read"
                         (click)="onNotificationClick(notification)">
                        <img class="notification-thumb"
                             *ngIf="notification.videoThumbnail"
                             [src]="notification.videoThumbnail"
                             alt="">
                        <div class="notification-content">
                            <p class="notification-message">{{ notification.message }}</p>
                            <span class="notification-time">{{ notification.createdAt | timeAgo }}</span>
                        </div>
                    </div>
                    <div class="notification-empty" *ngIf="notifications.length === 0">
                        No notifications
                    </div>
                </div>
            </div>
        </div>

        <!-- UPLOAD VIDEO -->
        <button *ngIf="isAuthenticated"
                mat-icon-button
                routerLink="/upload-video"
                aria-label="Upload video"
        >
            <mat-icon>video_call</mat-icon>
        </button>
        <button *ngIf="isAuthenticated; else noAuth"
                [matMenuTriggerFor]="menu"
                mat-icon-button class="example-icon"
                aria-label="Example icon-button with share icon">
            <mat-icon>account_circle</mat-icon>
        </button>
        <mat-menu #menu="matMenu">
            <button mat-menu-item (click)="logOff()">Logout</button>
        </mat-menu>
        <ng-template #noAuth>
            <button mat-raised-button class="login-btn" (click)="login()">Login</button>
        </ng-template>
    </mat-toolbar-row>
</mat-toolbar>

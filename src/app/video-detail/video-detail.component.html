<div class="video-page">
    <!-- LEFT: VIDEO + DETAILS -->
    <div class="video-primary">
        <app-video-player
                *ngIf="videoAvailable"
                [videoUrl]="videoUrl">
        </app-video-player>

        <!-- TITLE -->
        <h1 class="video-title">{{ videoTitle }}</h1>

        <!-- INFO ROW -->
        <div class="video-meta">
            <div class="video-meta-left">
                <span>{{ viewCount }} views</span>
                <span class="dot"></span>
                <span>{{ createdAt | timeAgo }}</span>
            </div>

            <div class="video-actions">
                <div class="action-group">
                    <button class="action-btn" (click)="likeVideo()">
                        <mat-icon>thumb_up</mat-icon>
                        <span>{{ likeCount }}</span>
                    </button>

                    <div class="divider"></div>

                    <button class="action-btn" (click)="disLikeVideo()">
                        <mat-icon>thumb_down</mat-icon>
                        <span>{{ dislikeCount }}</span>
                    </button>
                </div>

                <!-- SHARE -->
                <button class="action-btn single" (click)="shareVideo()">
                    <mat-icon>share</mat-icon>
                    <span>Share</span>
                </button>

                <!-- SAVE TO PLAYLIST -->
                <div class="playlist-menu-wrapper">
                    <button class="action-btn single" (click)="togglePlaylistMenu()">
                        <mat-icon>playlist_add</mat-icon>
                        <span>Save</span>
                    </button>
                    <div class="playlist-dropdown" *ngIf="showPlaylistMenu">
                        <div class="playlist-dropdown-header">Save to playlist</div>
                        <div class="playlist-dropdown-item"
                             *ngFor="let playlist of userPlaylists"
                             (click)="addToPlaylist(playlist.id)">
                            {{ playlist.name }}
                        </div>
                        <div class="playlist-dropdown-empty" *ngIf="userPlaylists.length === 0 && !showCreatePlaylist">
                            No playlists found
                        </div>
                        <div class="playlist-dropdown-divider"></div>
                        <div class="playlist-create-inline" *ngIf="showCreatePlaylist">
                            <input type="text"
                                   class="playlist-create-input"
                                   [(ngModel)]="newPlaylistName"
                                   placeholder="Playlist name"
                                   (keyup.enter)="createPlaylistAndAdd()">
                            <div class="playlist-create-actions">
                                <button class="playlist-create-btn cancel" (click)="showCreatePlaylist = false">Cancel</button>
                                <button class="playlist-create-btn create" (click)="createPlaylistAndAdd()">Create</button>
                            </div>
                        </div>
                        <div class="playlist-dropdown-item create-new" *ngIf="!showCreatePlaylist"
                             (click)="showCreatePlaylist = true">
                            <mat-icon>add</mat-icon>
                            Create new playlist
                        </div>
                    </div>
                </div>

                <!-- DELETE (owner only) -->
                <button class="action-btn single" *ngIf="isOwner" (click)="deleteVideo()">
                    <mat-icon>delete</mat-icon>
                    <span>Delete</span>
                </button>

                <!-- MORE / REPORT -->
                <div class="more-menu-wrapper">
                    <button class="action-btn single icon-only" (click)="showReportMenu = !showReportMenu">
                        <mat-icon>more_horiz</mat-icon>
                    </button>
                    <div class="more-dropdown" *ngIf="showReportMenu">
                        <button class="more-dropdown-item" (click)="reportVideo()">
                            <mat-icon>flag</mat-icon>
                            Report
                        </button>
                    </div>
                </div>
            </div>

        </div>

        <mat-divider></mat-divider>

        <!-- CHANNEL ROW -->
        <div class="channel-row">
            <div class="channel-info">
                <a routerLink="/channel/{{ videoUserId }}">
                    <img
                            mat-card-avatar
                            class="channel-avatar"
                            [src]="userPicture || 'assets/avatar.png'"
                            alt="Channel">
                </a>
                <div>
                    <a class="channel-name" routerLink="/channel/{{ videoUserId }}">{{ userFullName || 'Unknown' }}</a>
                    <div class="channel-subs">{{ subscriberCount }} subscribers</div>
                </div>
            </div>

            <button mat-raised-button color="warn" *ngIf="showSubscribeButton" (click)="subscribeToUser()">
                Subscribe
            </button>
            <button
                    mat-raised-button
                    class="subscribed-btn"
                    *ngIf="showUnSubscribeButton"
                    (click)="unSubscribeToUser()">
                Subscribed
            </button>
        </div>

        <mat-divider></mat-divider>

        <!-- DESCRIPTION -->
        <div class="video-description">
            {{ videoDescription }}
        </div>

        <mat-divider></mat-divider>

        <!-- COMMENTS -->
        <app-comments
                *ngIf="videoAvailable"
                [videoId]="videoId">
        </app-comments>
    </div>

    <!-- RIGHT: SUGGESTIONS -->
    <div class="video-secondary">
        <!--        <app-video-suggestions></app-video-suggestions>-->
    </div>
</div>
